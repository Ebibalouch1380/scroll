<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="box">
            <h2>scroll to change background</h2>
        </div>

        <script>
            

let box = document.querySelector('.box');
let images = ['img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg', 'img6.jpg'];

// یک تابع برای تغییر عکس که همیشه درست کار کند
function changeBackground() {
    let scrollPosition = window.scrollY;
    let viewportHeight = window.innerHeight;
    let totalHeight = document.documentElement.scrollHeight - viewportHeight;
    
    // محاسبه درصد اسکرول (بین 0 تا 1)
    let scrollFraction = scrollPosition / totalHeight;
    
    // پیدا کردن ایندکس عکس (0 تا 5)
    let imageIndex = Math.floor(scrollFraction * images.length);
    
    // اطمینان از اینکه ایندکس از محدوده خارج نشود (مخصوصاً در انتهای صفحه)
    if (imageIndex >= images.length) {
        imageIndex = images.length - 1;
    }
    if (imageIndex < 0) {
        imageIndex = 0;
    }

    box.style.backgroundImage = `url(${images[imageIndex]})`;
}

// گوش دادن به اسکرول
window.addEventListener('scroll', changeBackground);

// فراخوانی یکباره در لحظه لود شدن برای نمایش اولین عکس
changeBackground();
      </script>
</body>
</html>
