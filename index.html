<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="box">
            <h2>scroll to change background</h2>
        </div>

        <script>
            

let box = document.querySelector('.box');
let images = ['img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg', 'img6.jpg'];

window.addEventListener('scroll', () => {
    let scrollPosition = window.scrollY;
    let viewportHeight = window.innerHeight;
    
    // تقسیم بر ارتفاع دید؛ Math.min تضمین می‌کند از عکس ششم فراتر نرود
    let imageIndex = Math.floor(scrollPosition / viewportHeight);
    
    if (imageIndex >= images.length) {
        imageIndex = images.length - 1;
    }

    box.style.backgroundImage = `url(${images[imageIndex]})`;
    
    // برای تست: این خط را در کنسول مرورگر می‌توانی ببینی که عکس چندم است
    console.log("Current Image Index:", imageIndex);
});

      </script>
</body>
</html>
