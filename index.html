<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="box">
           
        </div>

        <script>
            

const box = document.querySelector('.box');
const images = ['img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg', 'img6.jpg'];

window.addEventListener('scroll', () => {
    // مقدار دقیق اسکرول
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    // ارتفاع هر بخش برای هر عکس
    const sectionHeight = window.innerHeight;
    
    // محاسبه ایندکس
    let index = Math.floor(scrollTop / sectionHeight);
    
    // جلوگیری از خطا (ایندکس نباید از 0 کمتر یا از 5 بیشتر بشه)
    if (index < 0) index = 0;
    if (index >= images.length) index = images.length - 1;
    
    // اعمال عکس
    box.style.backgroundImage = `url(${images[index]})`;
});


      </script>
</body>
</html>
