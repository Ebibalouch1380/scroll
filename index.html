<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>change background</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="box">
            <h2>scroll to change background</h2>
        </div>

        <script>
            

let box = document.querySelector('.box');
let images = ['img1.jpg','img2.jpg','img3.jpg','img4.jpg','img5.jpg','img6.jpg'];
 if (imageIndex >= images.length) imageIndex = images.length - 1;


window.addEventListener('scroll', () => {
    let scrollPosition = window.scrollY;
    let viewportHeight = window.innerHeight;
    
    // فرمول جدید برای توزیع بهتر عکس‌ها در کل طول صفحه
    let totalScrollableHeight = document.documentElement.scrollHeight - viewportHeight;
    let scrollPercentage = scrollPosition / totalScrollableHeight;
    let imageIndex = Math.floor(scrollPercentage * images.length);

    // جلوگیری از خطا وقتی اسکرول به ته ته می‌رسد
    if (imageIndex >= images.length) imageIndex = images.length - 1;

    box.style.backgroundImage = `url(${images[imageIndex]})`;
});

});
        </script>
</body>
</html>
